<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Guess - Adivinhe o Brawler!</title>
    <style>
        :root {
            --brawl-yellow: #ffcb05;
            --brawl-blue: #0066cc;
            --brawl-dark: #1a1a1a;
        }

        body {
            font-family: 'Arial Black', sans-serif;
            background-color: var(--brawl-dark);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 20px;
            border: 5px solid var(--brawl-blue);
            text-align: center;
            box-shadow: 0 10px 0px #004488;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: var(--brawl-yellow);
            text-shadow: 2px 2px 0 #000;
            margin-top: 0;
        }

        .hint-box {
            background: #444;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            min-height: 50px;
        }

        input {
            padding: 12px;
            width: 80%;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            margin-bottom: 10px;
            text-align: center;
        }

        button {
            background: #58db1b;
            border: none;
            padding: 12px 25px;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 0 #3a9112;
            font-size: 1rem;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #3a9112;
        }

        #message {
            margin-top: 20px;
            font-weight: bold;
        }

        .stats {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>BRAWL GUESS</h1>
        <div class="hint-box" id="hint">Clique em "Novo Jogo" para começar!</div>
        
        <input type="text" id="guessInput" placeholder="Nome do Brawler..." autocomplete="off">
        <br>
        <button onclick="checkGuess()">ADIVINHAR</button>
        <button onclick="nextRound()" style="background: var(--brawl-blue); box-shadow: 0 4px 0 #003366;">NOVO JOGO</button>

        <div id="message"></div>
        <div class="stats">Acertos: <span id="score">0</span></div>
    </div>

    <script>
        // Lista atualizada com alguns brawlers e dicas
        const brawlers = [
            { name: "Shelly", hint: "O primeiro Brawler que você ganha no jogo." },
            { name: "El Primo", hint: "Um lutador mascarado que pula nos inimigos. 'ELLLL PRIMOOO!'" },
            { name: "Colt", hint: "Usa duas pistolas e se preocupa muito com o cabelo." },
            { name: "Leon", hint: "Um brawler lendário que fica invisível." },
            { name: "Mortis", hint: "O carrasco das criaturas da noite. Usa uma pá." },
            { name: "Crow", hint: "Um corvo que atira adagas venenosas." },
            { name: "Edgar", hint: "Usa um cachecol para bater nos outros e pula muito." },
            { name: "Spike", hint: "Um cacto fofinho que não fala nada." },
            { name: "Surge", hint: "Um robô que 'evolui' durante a partida com seu Super." },
            { name: "Kit", hint: "Um gato lendário que pula nos aliados ou inimigos." },
            { name: "Melodie", hint: "Uma cantora de Karaoke que tem notas orbitando ao redor." },
            { name: "Clancy", hint: "Um brawler que parece uma lagosta e sobe de nível." }
        ];

        let currentBrawler = {};
        let score = 0;

        function nextRound() {
            const randomIndex = Math.floor(Math.random() * brawlers.length);
            currentBrawler = brawlers[randomIndex];
            document.getElementById('hint').innerText = "Dica: " + currentBrawler.hint;
            document.getElementById('message').innerText = "";
            document.getElementById('guessInput').value = "";
            document.getElementById('guessInput').focus();
        }

        function checkGuess() {
            const userGuess = document.getElementById('guessInput').value.trim().toLowerCase();
            const correctAnswer = currentBrawler.name.toLowerCase();

            if (userGuess === correctAnswer) {
                document.getElementById('message').innerHTML = "<span style='color: #58db1b;'>CORRETO! 🌟</span>";
                score++;
                document.getElementById('score').innerText = score;
                setTimeout(nextRound, 1500);
            } else {
                document.getElementById('message').innerHTML = "<span style='color: #ff4444;'>Tente novamente!</span>";
            }
        }

        // Permitir apertar "Enter" para enviar
        document.getElementById('guessInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkGuess();
            }
        });

        // Iniciar o primeiro round
        window.onload = nextRound;
    </script>
</body>
</html>
